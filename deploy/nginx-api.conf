# Nginx trên VPS — proxy API subdomain → backend Docker
# Copy: sudo cp deploy/nginx-api.conf /etc/nginx/sites-available/sodoan-api
#       sudo ln -s /etc/nginx/sites-available/sodoan-api /etc/nginx/sites-enabled/
# Sau khi có SSL: certbot sẽ tự sửa file này

limit_req_zone $binary_remote_addr zone=api_burst:10m rate=200r/s;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=300r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
    listen 80;
    server_name api.sodoan.lcdkhoacntt1.com;

    server_tokens off;
    client_max_body_size 20M;

    location / {
        limit_req zone=api_burst burst=20 nodelay;
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }
}

# Login endpoint — giới hạn chặt hơn (thêm sau khi có SSL, trong block 443)
