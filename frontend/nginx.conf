limit_req_zone $binary_remote_addr zone=api_burst:10m rate=200r/s;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=300r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Blacklist file — admin có thể append IP thủ công nếu cần
# geo $blocked_ip { default 0; include /etc/nginx/blacklist.conf; }

server {
    listen 80;
    server_name sodoan.lcdkhoacntt1.com localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Ẩn phiên bản nginx
    server_tokens off;

    # Giới hạn body upload
    client_max_body_size 20M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Security headers (tầng server)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Chặn truy cập file ẩn
    location ~ /\. {
        deny all;
        return 404;
    }

    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        limit_conn conn_limit 10;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        # Tầng 1: burst 10 req/s — khớp rule backend blacklist
        limit_req zone=api_burst burst=20 nodelay;
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;
        limit_conn conn_limit 20;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        limit_req zone=api_general burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
